apiVersion: apps/v1
kind: Deployment
metadata:
  name: websample
  labels:
    app: websample
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websample
  template:
    metadata:
      labels:
        app: websample
    spec:
      containers:
      - name: websample
        image: acshgc1.azurecr.io/websample:v1
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /weatherforecast
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /weatherforecast
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10